<div class="current-weather">
  @if (currentWeather().name) {
    <div class="current-weather__card">
      <h2 class="current-weather__name">{{ currentWeather().name }}</h2>
      <span class="current-weather__temperature">{{ currentWeather().main?.temp }}°C</span>
      <span class="current-weather__description">{{ currentWeather().weather?.[0]?.description }}</span>
      <div class="current-weather__details">
        <span class="current-weather__humidity">💧 {{ currentWeather().main?.humidity }}%</span>
        <span class="current-weather__wind-speed">💨 {{ currentWeather().wind?.speed }} m/s</span>
      </div>
    </div>
  }
</div>
